name: Code Quality
description: >
  Runs lint, TypeScript type checking, and unit tests (with coverage upload).
  Expects node_modules to already be present on the runner.

runs:
  using: composite
  steps:
    - name: Lint
      shell: bash
      run: npm run lint:ci

    - name: Type check (shop + payments)
      shell: bash
      run: npm run type-check

    - name: Unit tests with coverage
      shell: bash
      run: npm run test:cov

    - name: Print coverage summary
      if: always()
      shell: bash
      run: |
        node -e "
          const t = require('./coverage/coverage-summary.json').total;
          const keys = ['statements','branches','functions','lines'];
          const line = keys.map(k => k[0].toUpperCase()+k.slice(1)+': '+t[k].pct+'%').join(' | ');
          console.log('Coverage: ' + line);
        "

    - name: Upload coverage report
      uses: actions/upload-artifact@v7
      if: always()
      with:
        name: coverage-report
        path: coverage/
        retention-days: 7
