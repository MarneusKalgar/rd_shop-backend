name: Code Quality
description: >
  Runs lint, TypeScript type checking, unit tests (with coverage upload),
  and buf proto breaking-change check.
  Expects node_modules to already be present on the runner.

runs:
  using: composite
  steps:
    - name: Set up buf
      uses: bufbuild/buf-setup-action@a47c93e0b1648d5651a065437926377d060baa99 # v1.50.0
      with:
        version: '1.50.0'

    - name: Fetch main branch for buf breaking check
      shell: bash
      run: git fetch origin main --depth=1

    - name: Check proto breaking changes
      shell: bash
      run: cd proto && buf breaking --against '../.git#branch=origin/main,subdir=proto' --config buf.breaking.yaml

    - name: Lint proto
      shell: bash
      run: cd proto && buf lint

    - name: Lint
      shell: bash
      run: npm run lint:ci

    - name: Type check (shop + payments + infra)
      shell: bash
      run: npm run type-check

    - name: Unit tests with coverage
      shell: bash
      run: npm run test:cov

    - name: Print coverage summary
      if: always()
      shell: bash
      run: |
        if [ -f coverage/coverage-summary.json ]; then
          node -e "
            const t = require('./coverage/coverage-summary.json').total;
            const keys = ['statements','branches','functions','lines'];
            const line = keys.map(k => k[0].toUpperCase()+k.slice(1)+': '+t[k].pct+'%').join(' | ');
            console.log('Coverage: ' + line);
          "
        else
          echo "No coverage data (tests skipped or failed before coverage was generated)"
        fi

    - name: Upload coverage report
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      if: always()
      with:
        name: coverage-report
        path: coverage/
        retention-days: 7
