name: PR Checks

on:
  pull_request:
    branches:
      - development
      - main
      - release/*

env:
  NODE_VERSION: '24'

# Cancel any in-flight run for the same PR when a new commit is pushed
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────────────────
  # Stage 1 · Install root + infra dependencies once and cache both
  # node_modules trees. Jobs that need them restore from cache
  # instead of running npm ci independently.
  # ──────────────────────────────────────────────────────────────
  install:
    name: Install Dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            package-lock.json
            infra/package-lock.json

      - name: Restore app node_modules cache
        id: app-node-modules-cache
        uses: actions/cache@v5
        with:
          path: node_modules
          key: app-node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Restore infra node_modules cache
        id: infra-node-modules-cache
        uses: actions/cache@v5
        with:
          path: infra/node_modules
          key: infra-node-modules-${{ runner.os }}-${{ hashFiles('infra/package-lock.json') }}

      - name: Install app dependencies
        if: steps.app-node-modules-cache.outputs.cache-hit != 'true'
        run: npm ci

      - name: Install infra dependencies
        if: steps.infra-node-modules-cache.outputs.cache-hit != 'true'
        run: npm ci --prefix infra

  # ──────────────────────────────────────────────────────────────
  # Stage 2 · Code quality (lint · type-check · unit tests)
  # ──────────────────────────────────────────────────────────────
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    needs: install
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore app node_modules from cache
        uses: actions/cache/restore@v5
        with:
          path: node_modules
          key: app-node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Restore infra node_modules from cache
        uses: actions/cache/restore@v5
        with:
          path: infra/node_modules
          key: infra-node-modules-${{ runner.os }}-${{ hashFiles('infra/package-lock.json') }}

      - uses: ./.github/actions/code-quality

  # ──────────────────────────────────────────────────────────────
  # Stage 3a · Integration tests (shop)
  # Runs in parallel with docker-preview-build — both need only
  # code-quality to pass. Testcontainers spins up a real Postgres
  # container via Docker-in-Docker; ubuntu-latest runners have
  # Docker Engine pre-installed so no extra setup is needed.
  # ──────────────────────────────────────────────────────────────
  integration-tests:
    name: Integration Tests (shop)
    runs-on: ubuntu-latest
    needs: code-quality
    timeout-minutes: 15 # Testcontainers image pull + app boot; fail fast if hung
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore node_modules from cache
        uses: actions/cache/restore@v5
        with:
          path: node_modules
          key: app-node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Run integration tests with coverage
        run: npm run test:integration:shop:cov

      - name: Print integration coverage summary
        if: always()
        run: |
          node -e "
            const t = require('./coverage-integration/coverage-summary.json').total;
            const keys = ['statements','branches','functions','lines'];
            const line = keys.map(k => k[0].toUpperCase()+k.slice(1)+': '+t[k].pct+'%').join(' | ');
            console.log('Integration coverage: ' + line);
          "

      - name: Upload integration coverage report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-integration-report
          path: coverage-integration/
          retention-days: 7

  # ──────────────────────────────────────────────────────────────
  # Stage 3b · Additional quality gate — Docker build validation
  # Validates that the production Dockerfile builds successfully
  # for both apps. Runs only after all stage-2 checks pass.
  # ──────────────────────────────────────────────────────────────
  docker-preview-build:
    name: Docker Preview Build (${{ matrix.app }})
    runs-on: ubuntu-latest
    needs: code-quality
    strategy:
      fail-fast: true
      matrix:
        app: [shop, payments]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build ${{ matrix.app }} production image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          target: prod-distroless-${{ matrix.app }}
          build-args: APP=${{ matrix.app }}
          push: false
          # tags: |
          #   ghcr.io/${{ github.repository }}/${{ matrix.app }}:pr-${{ github.event.pull_request.number }}
          #   ghcr.io/${{ github.repository }}/${{ matrix.app }}:${{ github.sha }}
          # Layer cache scoped per app to speed up repeated builds
          cache-from: type=gha,scope=docker-${{ matrix.app }}
          cache-to: type=gha,mode=max,scope=docker-${{ matrix.app }}

  # ──────────────────────────────────────────────────────────────
  # Required check sentinel
  # Add THIS job name to your branch protection "required status
  # checks" — it aggregates every upstream result so you only
  # need to maintain one entry in the repository settings.
  # ──────────────────────────────────────────────────────────────
  all-checks-passed:
    name: All Checks Passed
    runs-on: ubuntu-latest
    needs: [code-quality, integration-tests, docker-preview-build]
    if: always()
    steps:
      - name: Write job summary
        run: |
          function badge() {
            case "$1" in
              success)   echo "✅ success"   ;;
              failure)   echo "❌ failure"   ;;
              cancelled) echo "⚠️ cancelled" ;;
              skipped)   echo "⏭️ skipped"   ;;
              *)         echo "❓ $1"        ;;
            esac
          }

          {
            echo "## PR Checks Summary"
            echo ""
            echo "| Job | Result |"
            echo "| --- | ------ |"
            echo "| Code Quality (lint · type-check · unit tests) | $(badge '${{ needs.code-quality.result }}') |"
            echo "| Integration Tests (shop)                      | $(badge '${{ needs.integration-tests.result }}') |"
            echo "| Docker Preview Build (shop, payments)         | $(badge '${{ needs.docker-preview-build.result }}') |"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Evaluate upstream results
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" \
            || "${{ contains(needs.*.result, 'cancelled') }}" == "true" \
            || "${{ contains(needs.*.result, 'skipped') }}" == "true" ]]; then
            echo "One or more required checks failed, were cancelled, or were skipped."
            exit 1
          fi
          echo "All required checks passed."
