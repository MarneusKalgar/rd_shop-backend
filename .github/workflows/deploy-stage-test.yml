name: Deploy — Stage Test Wrapper

on:
  # Branch-local harness for validating the actual AWS/Pulumi stage lane
  # without waiting for the default-branch workflow_run path.
  # Run on every push to these dedicated CI branches so wrapper
  # behavior is not gated by path-filter edge cases.
  push:
    branches:
      - ci/stage-test/**
      - ci/stage-validation-test/**

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'eu-central-1' }}
  PULUMI_STACK: stage

concurrency:
  group: deploy-stage
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Stage Test Wrapper
    runs-on: ubuntu-latest
    environment: stage
    permissions:
      actions: write
      contents: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          role-session-name: gha-stage-test-${{ github.run_id }}

      - name: Verify AWS identity
        run: aws sts get-caller-identity

      - name: Log deploy test context
        run: |
          echo "Repository: ${GITHUB_REPOSITORY}"
          echo "Workflow: ${GITHUB_WORKFLOW}"
          echo "Branch: ${GITHUB_REF_NAME}"
          echo "Commit: ${GITHUB_SHA}"
          echo "Run id: ${GITHUB_RUN_ID}"
          echo "Run attempt: ${GITHUB_RUN_ATTEMPT}"

      - name: Wait for matching build wrapper run
        id: build_run
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          dispatched_build_run=false

          echo "::group::Build waiter context"
          echo "Workflow file: build-and-push-test.yml"
          echo "Repository: ${GITHUB_REPOSITORY}"
          echo "Branch: ${GITHUB_REF_NAME}"
          echo "Commit: ${GITHUB_SHA}"
          echo "::endgroup::"

          for attempt in $(seq 1 40); do
            run_json="$(gh api \
              "/repos/${GITHUB_REPOSITORY}/actions/workflows/build-and-push-test.yml/runs?per_page=100")"

            if [[ "${attempt}" == "1" || "${attempt}" == "10" || "${attempt}" == "20" || "${attempt}" == "30" || "${attempt}" == "40" ]]; then
              echo "::group::Recent build wrapper runs (${attempt}/40)"
              echo "${run_json}" | jq -r '
                .workflow_runs[:10]
                | if length == 0 then
                    "No build wrapper runs returned"
                  else
                    .[] | "- id=\(.id) event=\(.event) status=\(.status) conclusion=\(.conclusion // "pending") branch=\(.head_branch) sha=\(.head_sha) created=\(.created_at)"
                  end
              '
              echo "::endgroup::"
            fi

            matching_run_json="$(echo "${run_json}" | jq -c --arg sha "${GITHUB_SHA}" --arg branch "${GITHUB_REF_NAME}" '
              .workflow_runs
              | map(select(.head_sha == $sha and .head_branch == $branch))
              | sort_by(.created_at)
              | last // empty
            ')"

            if [[ -n "${matching_run_json}" ]]; then
              run_id="$(echo "${matching_run_json}" | jq -r '.id')"

              echo "Found build wrapper run ${run_id} for ${GITHUB_SHA}"
              echo "::group::Matched build wrapper run"
              echo "${matching_run_json}" | jq '{id, status, conclusion, event, head_branch, head_sha, created_at, updated_at, html_url}'
              echo "::endgroup::"
              echo "run_id=${run_id}" >> "$GITHUB_OUTPUT"

              if ! gh run watch "${run_id}" \
                --repo "${GITHUB_REPOSITORY}" \
                --exit-status \
                --interval 15; then
                echo "::group::Build wrapper run failure details"
                gh api \
                  "/repos/${GITHUB_REPOSITORY}/actions/runs/${run_id}" | jq '{id, status, conclusion, event, head_branch, head_sha, created_at, updated_at, html_url}'
                echo "::endgroup::"
                exit 1
              fi

              exit 0
            fi

            if [[ "${dispatched_build_run}" != "true" && "${attempt}" == "8" ]]; then
              echo "::group::Dispatch build wrapper fallback"
              gh workflow run build-and-push-test.yml \
                --repo "${GITHUB_REPOSITORY}" \
                --ref "${GITHUB_REF_NAME}"
              dispatched_build_run=true
              echo "Dispatched build wrapper manually for ${GITHUB_REF_NAME} at ${GITHUB_SHA}"
              echo "::endgroup::"
            fi

            if [[ "${attempt}" == "40" ]]; then
              echo "Timed out waiting for matching build wrapper run to appear" >&2
              exit 1
            fi

            echo "Matching build wrapper run not visible yet (${attempt}/40)"
            sleep 15
          done

      - name: Log matched build wrapper artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          echo "::group::Matched build wrapper artifacts"
          gh api \
            "/repos/${GITHUB_REPOSITORY}/actions/runs/${{ steps.build_run.outputs.run_id }}/artifacts" | jq -r '
              .artifacts
              | if length == 0 then
                  "No artifacts uploaded for matched build wrapper run"
                else
                  .[] | "- name=\(.name) size=\(.size_in_bytes) expired=\(.expired) created=\(.created_at)"
                end
            '
          echo "::endgroup::"

      - name: Download release manifest
        uses: actions/download-artifact@v8
        with:
          name: release-manifest-${{ github.sha }}
          run-id: ${{ steps.build_run.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Parse release manifest
        id: manifest
        uses: ./.github/actions/parse-release-manifest

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: infra/package-lock.json

      - name: Install infra dependencies
        run: npm ci --prefix infra

      - name: Install Pulumi CLI
        uses: pulumi/actions@v6
        with:
          pulumi-version: '^3'

      - name: Verify Pulumi access
        working-directory: infra
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
        run: |
          pulumi login
          pulumi whoami

      - name: Configure stage stack image inputs
        working-directory: infra
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
        run: |
          pulumi stack select "${{ env.PULUMI_STACK }}"
          pulumi config set --stack "${{ env.PULUMI_STACK }}" rd-shop-infra:shopImageUri "${{ steps.manifest.outputs.shop-image }}"
          pulumi config set --stack "${{ env.PULUMI_STACK }}" rd-shop-infra:paymentsImageUri "${{ steps.manifest.outputs.payments-image }}"

      - name: Capture current stage service outputs
        id: current_stack
        working-directory: infra
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
        run: |
          set -euo pipefail

          pulumi stack select "${{ env.PULUMI_STACK }}"

          ecs_cluster_name="$(pulumi stack output ecsClusterName 2>/dev/null || true)"
          payments_service_name="$(pulumi stack output paymentsServiceName 2>/dev/null || true)"
          shop_service_name="$(pulumi stack output shopServiceName 2>/dev/null || true)"

          if [[ -n "${ecs_cluster_name}" && -n "${payments_service_name}" && -n "${shop_service_name}" && "${ecs_cluster_name}" != "null" && "${payments_service_name}" != "null" && "${shop_service_name}" != "null" ]]; then
            echo "services_present=true" >> "$GITHUB_OUTPUT"
            echo "ecs_cluster_name=${ecs_cluster_name}" >> "$GITHUB_OUTPUT"
            echo "payments_service_name=${payments_service_name}" >> "$GITHUB_OUTPUT"
            echo "shop_service_name=${shop_service_name}" >> "$GITHUB_OUTPUT"
          else
            echo "services_present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Quiesce existing ECS services before apply
        id: pre_quiesce_services
        if: ${{ steps.current_stack.outputs.services_present == 'true' }}
        env:
          ECS_CLUSTER_NAME: ${{ steps.current_stack.outputs.ecs_cluster_name }}
          PAYMENTS_SERVICE_NAME: ${{ steps.current_stack.outputs.payments_service_name }}
          SHOP_SERVICE_NAME: ${{ steps.current_stack.outputs.shop_service_name }}
        run: |
          set -euo pipefail

          payments_desired_count=$(aws ecs describe-services \
            --cluster "${ECS_CLUSTER_NAME}" \
            --services "${PAYMENTS_SERVICE_NAME}" \
            --query 'services[0].desiredCount' \
            --output text)
          shop_desired_count=$(aws ecs describe-services \
            --cluster "${ECS_CLUSTER_NAME}" \
            --services "${SHOP_SERVICE_NAME}" \
            --query 'services[0].desiredCount' \
            --output text)

          echo "PAYMENTS_DESIRED_COUNT=${payments_desired_count}" >> "$GITHUB_ENV"
          echo "SHOP_DESIRED_COUNT=${shop_desired_count}" >> "$GITHUB_ENV"

          aws ecs update-service \
            --cluster "${ECS_CLUSTER_NAME}" \
            --service "${PAYMENTS_SERVICE_NAME}" \
            --desired-count 0 >/dev/null
          aws ecs update-service \
            --cluster "${ECS_CLUSTER_NAME}" \
            --service "${SHOP_SERVICE_NAME}" \
            --desired-count 0 >/dev/null

          aws ecs wait services-stable \
            --cluster "${ECS_CLUSTER_NAME}" \
            --services "${PAYMENTS_SERVICE_NAME}"
          aws ecs wait services-stable \
            --cluster "${ECS_CLUSTER_NAME}" \
            --services "${SHOP_SERVICE_NAME}"

      - name: Apply stage stack
        working-directory: infra
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
        run: |
          pulumi stack select "${{ env.PULUMI_STACK }}"
          pulumi up --stack "${{ env.PULUMI_STACK }}" --yes --non-interactive

      - name: Capture stage outputs
        id: stack
        working-directory: infra
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
        run: |
          pulumi stack select "${{ env.PULUMI_STACK }}"

          echo "ecs_cluster_name=$(pulumi stack output ecsClusterName)" >> "$GITHUB_OUTPUT"
          echo "database_backend=$(pulumi stack output databaseBackend)" >> "$GITHUB_OUTPUT"
          echo "database_bootstrap_container_name=$(pulumi stack output databaseBootstrapContainerName 2>/dev/null || true)" >> "$GITHUB_OUTPUT"
          echo "database_bootstrap_instance_id=$(pulumi stack output databaseBootstrapInstanceId 2>/dev/null || true)" >> "$GITHUB_OUTPUT"
          echo "payments_log_group_name=$(pulumi stack output paymentsLogGroupName)" >> "$GITHUB_OUTPUT"
          echo "payments_service_name=$(pulumi stack output paymentsServiceName)" >> "$GITHUB_OUTPUT"
          echo "payments_task_definition_arn=$(pulumi stack output paymentsTaskDefinitionArn)" >> "$GITHUB_OUTPUT"
          echo "shop_log_group_name=$(pulumi stack output shopLogGroupName)" >> "$GITHUB_OUTPUT"
          echo "shop_service_name=$(pulumi stack output shopServiceName)" >> "$GITHUB_OUTPUT"
          echo "shop_target_group_arn=$(pulumi stack output shopTargetGroupArn)" >> "$GITHUB_OUTPUT"
          echo "shop_task_definition_arn=$(pulumi stack output shopTaskDefinitionArn)" >> "$GITHUB_OUTPUT"

          public_endpoint_url="$(pulumi stack output publicEndpointUrl 2>/dev/null || true)"
          if [[ -z "${public_endpoint_url}" || "${public_endpoint_url}" == "null" ]]; then
            echo "Stage public endpoint URL is not available" >&2
            exit 1
          fi
          echo "public_endpoint_url=${public_endpoint_url}" >> "$GITHUB_OUTPUT"

      - name: Quiesce newly created ECS services before DB init
        id: post_apply_quiesce_services
        if: ${{ steps.current_stack.outputs.services_present != 'true' }}
        env:
          ECS_CLUSTER_NAME: ${{ steps.stack.outputs.ecs_cluster_name }}
          PAYMENTS_SERVICE_NAME: ${{ steps.stack.outputs.payments_service_name }}
          SHOP_SERVICE_NAME: ${{ steps.stack.outputs.shop_service_name }}
        run: |
          set -euo pipefail

          payments_desired_count=$(aws ecs describe-services \
            --cluster "${ECS_CLUSTER_NAME}" \
            --services "${PAYMENTS_SERVICE_NAME}" \
            --query 'services[0].desiredCount' \
            --output text)
          shop_desired_count=$(aws ecs describe-services \
            --cluster "${ECS_CLUSTER_NAME}" \
            --services "${SHOP_SERVICE_NAME}" \
            --query 'services[0].desiredCount' \
            --output text)

          echo "PAYMENTS_DESIRED_COUNT=${payments_desired_count}" >> "$GITHUB_ENV"
          echo "SHOP_DESIRED_COUNT=${shop_desired_count}" >> "$GITHUB_ENV"

          aws ecs update-service \
            --cluster "${ECS_CLUSTER_NAME}" \
            --service "${PAYMENTS_SERVICE_NAME}" \
            --desired-count 0 >/dev/null
          aws ecs update-service \
            --cluster "${ECS_CLUSTER_NAME}" \
            --service "${SHOP_SERVICE_NAME}" \
            --desired-count 0 >/dev/null

          aws ecs wait services-stable \
            --cluster "${ECS_CLUSTER_NAME}" \
            --services "${PAYMENTS_SERVICE_NAME}"
          aws ecs wait services-stable \
            --cluster "${ECS_CLUSTER_NAME}" \
            --services "${SHOP_SERVICE_NAME}"

      - name: Wait for stage PostgreSQL host
        if: ${{ steps.stack.outputs.database_backend == 'ec2-postgres' }}
        env:
          DATABASE_BOOTSTRAP_CONTAINER_NAME: ${{ steps.stack.outputs.database_bootstrap_container_name }}
          DATABASE_BOOTSTRAP_INSTANCE_ID: ${{ steps.stack.outputs.database_bootstrap_instance_id }}
        run: |
          set -euo pipefail

          dump_stage_postgres_host_diagnostics() {
            local diagnostic_commands
            local diagnostic_command_id

            diagnostic_commands=$(jq -nc --arg container_name "${DATABASE_BOOTSTRAP_CONTAINER_NAME}" '{
              commands: [
                "sudo docker ps -a --no-trunc --filter name=" + $container_name,
                "sudo docker logs " + $container_name + " --tail 200 || true",
                "sudo tail -n 200 /var/log/cloud-init-output.log || true",
                "sudo tail -n 200 /var/log/cloud-init.log || true"
              ]
            }')

            diagnostic_command_id="$(aws ssm send-command \
              --instance-ids "${DATABASE_BOOTSTRAP_INSTANCE_ID}" \
              --document-name 'AWS-RunShellScript' \
              --comment 'Dump stage PostgreSQL host diagnostics' \
              --parameters "${diagnostic_commands}" \
              --query 'Command.CommandId' \
              --output text 2>/tmp/stage-db-diagnostics.err || true)"

            if [[ -z "${diagnostic_command_id}" || "${diagnostic_command_id}" == "None" ]]; then
              cat /tmp/stage-db-diagnostics.err >&2 || true
              return
            fi

            aws ssm wait command-executed \
              --command-id "${diagnostic_command_id}" \
              --instance-id "${DATABASE_BOOTSTRAP_INSTANCE_ID}" || true

            echo "Stage PostgreSQL host diagnostics:"
            aws ssm get-command-invocation \
              --command-id "${diagnostic_command_id}" \
              --instance-id "${DATABASE_BOOTSTRAP_INSTANCE_ID}" \
              --query '{stdout:StandardOutputContent,stderr:StandardErrorContent}' \
              --output json || true
          }

          diagnostics_dumped=false

          for attempt in $(seq 1 30); do
            command_id="$(aws ssm send-command \
              --instance-ids "${DATABASE_BOOTSTRAP_INSTANCE_ID}" \
              --document-name 'AWS-RunShellScript' \
              --comment 'Wait for the stage PostgreSQL host to become ready' \
              --parameters "{\"commands\":[\"sudo docker exec ${DATABASE_BOOTSTRAP_CONTAINER_NAME} pg_isready -h 127.0.0.1 -p 5432 -U postgres\"]}" \
              --query 'Command.CommandId' \
              --output text 2>/tmp/stage-db-wait.err || true)"

            if [[ -z "${command_id}" || "${command_id}" == "None" ]]; then
              if grep -Eq 'TargetNotConnected|InvalidInstanceId' /tmp/stage-db-wait.err; then
                echo "Stage PostgreSQL host is not ready for SSM yet (${attempt}/30)"
                sleep 10
                continue
              fi

              cat /tmp/stage-db-wait.err >&2 || true
              exit 1
            fi

            aws ssm wait command-executed \
              --command-id "${command_id}" \
              --instance-id "${DATABASE_BOOTSTRAP_INSTANCE_ID}" || true

            command_status="$(aws ssm get-command-invocation \
              --command-id "${command_id}" \
              --instance-id "${DATABASE_BOOTSTRAP_INSTANCE_ID}" \
              --query 'Status' \
              --output text)"

            if [[ "${command_status}" == "Success" ]]; then
              exit 0
            fi

            echo "Stage PostgreSQL host readiness status: ${command_status} (${attempt}/30)"
            aws ssm get-command-invocation \
              --command-id "${command_id}" \
              --instance-id "${DATABASE_BOOTSTRAP_INSTANCE_ID}" \
              --query '{stdout:StandardOutputContent,stderr:StandardErrorContent}' \
              --output json || true

            if [[ "${command_status}" == "Failed" && "${diagnostics_dumped}" != "true" ]]; then
              diagnostics_dumped=true
              dump_stage_postgres_host_diagnostics
              exit 1
            fi

            sleep 10
          done

          if [[ "${diagnostics_dumped}" != "true" ]]; then
            dump_stage_postgres_host_diagnostics
          fi

          echo "Timed out waiting for the stage PostgreSQL host to become ready" >&2
          exit 1

      - name: Run stage database init tasks
        id: db_init
        env:
          ECS_CLUSTER_NAME: ${{ steps.stack.outputs.ecs_cluster_name }}
          PAYMENTS_LOG_GROUP_NAME: ${{ steps.stack.outputs.payments_log_group_name }}
          PAYMENTS_TASK_DEFINITION_ARN: ${{ steps.stack.outputs.payments_task_definition_arn }}
          SHOP_LOG_GROUP_NAME: ${{ steps.stack.outputs.shop_log_group_name }}
          SHOP_TASK_DEFINITION_ARN: ${{ steps.stack.outputs.shop_task_definition_arn }}
        run: |
          set -euo pipefail

          run_task() {
            local label="$1"
            local task_definition_arn="$2"
            local container_name="$3"
            local command_json="$4"
            local log_group_name="$5"
            local environment_json="${6:-[]}"

            local overrides
            overrides=$(jq -n \
              --arg name "${container_name}" \
              --argjson command "${command_json}" \
              --argjson environment "${environment_json}" \
              '{containerOverrides:[{name:$name,command:$command,environment:$environment}]}')

            local run_task_output
            run_task_output=$(aws ecs run-task \
              --cluster "${ECS_CLUSTER_NAME}" \
              --launch-type EC2 \
              --count 1 \
              --task-definition "${task_definition_arn}" \
              --started-by "gha-stage-test-${{ github.run_id }}-${label}" \
              --overrides "${overrides}" \
              --output json)

            if [[ "$(echo "${run_task_output}" | jq '.failures | length')" != "0" ]]; then
              echo "Failed to start task ${label}"
              echo "${run_task_output}" | jq .
              return 1
            fi

            local task_arn
            task_arn=$(echo "${run_task_output}" | jq -r '.tasks[0].taskArn')

            aws ecs wait tasks-stopped --cluster "${ECS_CLUSTER_NAME}" --tasks "${task_arn}"

            local task_description
            task_description=$(aws ecs describe-tasks \
              --cluster "${ECS_CLUSTER_NAME}" \
              --tasks "${task_arn}" \
              --output json)

            local task_stopped_reason
            task_stopped_reason=$(echo "${task_description}" | jq -r '.tasks[0].stoppedReason // ""')

            local exit_code
            exit_code=$(echo "${task_description}" | jq -r \
              --arg container_name "${container_name}" \
              '.tasks[0].containers[] | select(.name == $container_name) | .exitCode // ""')

            local container_reason
            container_reason=$(echo "${task_description}" | jq -r \
              --arg container_name "${container_name}" \
              '.tasks[0].containers[] | select(.name == $container_name) | .reason // ""')

            if [[ -z "${exit_code}" || "${exit_code}" != "0" ]]; then
              echo "Task ${label} failed"
              if [[ -n "${task_stopped_reason}" ]]; then
                echo "Stopped reason: ${task_stopped_reason}"
              fi
              if [[ -n "${container_reason}" ]]; then
                echo "Container reason: ${container_reason}"
              fi

              local task_id
              task_id="${task_arn##*/}"

              local log_stream_name
              log_stream_name=$(aws logs describe-log-streams \
                --log-group-name "${log_group_name}" \
                --log-stream-name-prefix "${container_name}/${container_name}/" \
                --output json | jq -r --arg task_id "${task_id}" \
                '.logStreams[]? | select(.logStreamName | contains($task_id)) | .logStreamName' | head -n 1)

              if [[ -n "${log_stream_name}" ]]; then
                echo "CloudWatch logs (${log_group_name} / ${log_stream_name}):"
                aws logs get-log-events \
                  --log-group-name "${log_group_name}" \
                  --log-stream-name "${log_stream_name}" \
                  --limit 100 \
                  --output json | jq -r '.events[]?.message'
              else
                echo "CloudWatch log stream not found for task ${task_id} in ${log_group_name}"
              fi

              echo "${task_description}" | jq .
              return 1
            fi

            return 0
          }

          task_failures=()

          if ! run_task \
            payments-migrate \
            "${PAYMENTS_TASK_DEFINITION_ARN}" \
            payments \
            '["node_modules/typeorm/cli.js","migration:run","-d","dist/apps/payments/data-source.js"]' \
            "${PAYMENTS_LOG_GROUP_NAME}"; then
            task_failures+=("payments-migrate")
          fi

          shop_migrate_succeeded=false
          if run_task \
            shop-migrate \
            "${SHOP_TASK_DEFINITION_ARN}" \
            shop \
            '["node_modules/typeorm/cli.js","migration:run","-d","dist/apps/shop/data-source.js"]' \
            "${SHOP_LOG_GROUP_NAME}"; then
            shop_migrate_succeeded=true
          else
            task_failures+=("shop-migrate")
          fi

          if [[ "${shop_migrate_succeeded}" == "true" ]]; then
            if ! run_task \
              shop-seed \
              "${SHOP_TASK_DEFINITION_ARN}" \
              shop \
              '["dist/apps/shop/db/seed/stage.js"]' \
              "${SHOP_LOG_GROUP_NAME}"; then
              task_failures+=("shop-seed")
            fi
          else
            echo "Skipping shop-seed because shop-migrate failed"
          fi

          if (( ${#task_failures[@]} > 0 )); then
            echo "DB init failures: ${task_failures[*]}"
            exit 1
          fi

      - name: Restore ECS services and trigger rollout
        if: ${{ always() && (steps.pre_quiesce_services.outcome == 'success' || steps.post_apply_quiesce_services.outcome == 'success') }}
        env:
          ECS_CLUSTER_NAME: ${{ steps.stack.outputs.ecs_cluster_name }}
          PAYMENTS_SERVICE_NAME: ${{ steps.stack.outputs.payments_service_name }}
          SHOP_SERVICE_NAME: ${{ steps.stack.outputs.shop_service_name }}
        run: |
          set -euo pipefail

          if [[ -z "${PAYMENTS_DESIRED_COUNT:-}" || -z "${SHOP_DESIRED_COUNT:-}" ]]; then
            echo "Saved desired counts are unavailable; skipping ECS restore"
            exit 0
          fi

          aws ecs update-service \
            --cluster "${ECS_CLUSTER_NAME}" \
            --service "${PAYMENTS_SERVICE_NAME}" \
            --desired-count "${PAYMENTS_DESIRED_COUNT}" \
            --force-new-deployment >/dev/null
          aws ecs update-service \
            --cluster "${ECS_CLUSTER_NAME}" \
            --service "${SHOP_SERVICE_NAME}" \
            --desired-count "${SHOP_DESIRED_COUNT}" \
            --force-new-deployment >/dev/null

      - name: Wait for ECS services to stabilize
        if: ${{ always() && (steps.pre_quiesce_services.outcome == 'success' || steps.post_apply_quiesce_services.outcome == 'success') }}
        env:
          ECS_CLUSTER_NAME: ${{ steps.stack.outputs.ecs_cluster_name }}
          PAYMENTS_SERVICE_NAME: ${{ steps.stack.outputs.payments_service_name }}
          SHOP_SERVICE_NAME: ${{ steps.stack.outputs.shop_service_name }}
        run: |
          if [[ -z "${PAYMENTS_DESIRED_COUNT:-}" || -z "${SHOP_DESIRED_COUNT:-}" ]]; then
            echo "Saved desired counts are unavailable; skipping ECS stabilization wait"
            exit 0
          fi

          aws ecs wait services-stable \
            --cluster "${ECS_CLUSTER_NAME}" \
            --services "${PAYMENTS_SERVICE_NAME}"
          aws ecs wait services-stable \
            --cluster "${ECS_CLUSTER_NAME}" \
            --services "${SHOP_SERVICE_NAME}"

      - name: Dump ECS stabilization diagnostics
        if: ${{ failure() && (steps.pre_quiesce_services.outcome == 'success' || steps.post_apply_quiesce_services.outcome == 'success') }}
        env:
          ECS_CLUSTER_NAME: ${{ steps.stack.outputs.ecs_cluster_name }}
          PAYMENTS_SERVICE_NAME: ${{ steps.stack.outputs.payments_service_name }}
          SHOP_SERVICE_NAME: ${{ steps.stack.outputs.shop_service_name }}
          SHOP_TARGET_GROUP_ARN: ${{ steps.stack.outputs.shop_target_group_arn }}
        run: |
          set -euo pipefail

          echo "=== ECS service state ==="
          aws ecs describe-services \
            --cluster "${ECS_CLUSTER_NAME}" \
            --services "${PAYMENTS_SERVICE_NAME}" "${SHOP_SERVICE_NAME}" \
            --output json | jq '.services[] | {
              serviceName,
              status,
              desiredCount,
              runningCount,
              pendingCount,
              deployments: [.deployments[] | {
                status,
                rolloutState,
                desiredCount,
                runningCount,
                pendingCount,
                taskDefinition
              }],
              events: [.events[:10][] | {createdAt, message}]
            }'

          dump_tasks() {
            local service_name="$1"
            local task_arns

            task_arns=$(aws ecs list-tasks \
              --cluster "${ECS_CLUSTER_NAME}" \
              --service-name "${service_name}" \
              --desired-status RUNNING \
              --query 'taskArns' \
              --output text)

            if [[ -z "${task_arns}" || "${task_arns}" == "None" ]]; then
              task_arns=$(aws ecs list-tasks \
                --cluster "${ECS_CLUSTER_NAME}" \
                --service-name "${service_name}" \
                --desired-status STOPPED \
                --query 'taskArns[:5]' \
                --output text)
            fi

            if [[ -z "${task_arns}" || "${task_arns}" == "None" ]]; then
              echo "No tasks found for ${service_name}"
              return
            fi

            echo "=== Tasks for ${service_name} ==="
            aws ecs describe-tasks \
              --cluster "${ECS_CLUSTER_NAME}" \
              --tasks ${task_arns} \
              --output json | jq '.tasks[] | {
                taskArn,
                lastStatus,
                desiredStatus,
                healthStatus,
                stoppedReason,
                containers: [.containers[] | {
                  name,
                  lastStatus,
                  healthStatus,
                  exitCode,
                  reason
                }]
              }'
          }

          dump_tasks "${PAYMENTS_SERVICE_NAME}"
          dump_tasks "${SHOP_SERVICE_NAME}"

          if [[ -n "${SHOP_TARGET_GROUP_ARN}" && "${SHOP_TARGET_GROUP_ARN}" != "null" ]]; then
            echo "=== Shop target group health ==="
            aws elbv2 describe-target-health \
              --target-group-arn "${SHOP_TARGET_GROUP_ARN}" \
              --output json | jq '.TargetHealthDescriptions[] | {
                target: .Target,
                health: .TargetHealth
              }'
          fi

      - name: Smoke test — shop health check
        uses: ./.github/actions/smoke-test-shop-http
        with:
          base-url: ${{ steps.stack.outputs.public_endpoint_url }}

      - name: Write deploy summary
        if: always()
        uses: ./.github/actions/write-deploy-summary
        with:
          environment: stage
          commit: ${{ steps.manifest.outputs.commit }}
          ref: ${{ steps.manifest.outputs.ref }}
          shop-image: ${{ steps.manifest.outputs.shop-image }}
          shop-digest: ${{ steps.manifest.outputs.shop-digest }}
          payments-image: ${{ steps.manifest.outputs.payments-image }}
          payments-digest: ${{ steps.manifest.outputs.payments-digest }}

      - name: Write wrapper note
        if: always()
        run: |
          {
            echo "## Stage test wrapper"
            echo ""
            echo "- Path: push + waiter"
            echo "- Branch: ${{ github.ref_name }}"
            echo "- Stage role: ${{ vars.AWS_ROLE_ARN }}"
            echo "- Build wrapper run: ${{ steps.build_run.outputs.run_id }}"
            echo "- Shop image: ${{ steps.manifest.outputs.shop-image }}"
            echo "- Payments image: ${{ steps.manifest.outputs.payments-image }}"
            echo "- Pulumi stack: ${{ env.PULUMI_STACK }}"
            echo "- Mutation: real stage deploy path"
          } >> "$GITHUB_STEP_SUMMARY"
