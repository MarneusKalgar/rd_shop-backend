name: Build and Push — Test Wrapper

on:
  # Branch-local harness for validating OIDC auth and Docker build changes
  # without touching the real development build workflow.
  push:
    branches:
      - ci/build-test/**
    paths:
      - '.github/workflows/build-and-push.yml'
      - '.github/workflows/build-and-push-test.yml'
      - '.github/actions/**'
      - 'Dockerfile'
      - 'package.json'
      - 'package-lock.json'
      - 'apps/**'
      - 'libs/**'
      - 'proto/**'
      - 'nest-cli.json'
      - 'tsconfig.json'
      - 'tsconfig.build.json'

env:
  AWS_REGION: ${{ vars.AWS_REGION }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-auth-and-build:
    name: Verify Auth & Build (${{ matrix.app }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        app: [shop, payments]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ vars.AWS_ROLE_ARN_BUILD }}
          role-session-name: gha-build-test-${{ github.run_id }}

      - name: Verify AWS identity
        run: aws sts get-caller-identity

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image without push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          target: prod-distroless-${{ matrix.app }}
          build-args: APP=${{ matrix.app }}
          push: false
          cache-from: type=gha,scope=docker-build-test-${{ matrix.app }}
          cache-to: type=gha,mode=max,scope=docker-build-test-${{ matrix.app }}

      - name: Write test summary
        if: always()
        run: |
          {
            echo "## Build test wrapper"
            echo ""
            echo "- Branch: ${{ github.ref_name }}"
            echo "- App: ${{ matrix.app }}"
            echo "- AWS role: ${{ vars.AWS_ROLE_ARN_BUILD }}"
            echo "- Image push: skipped intentionally"
          } >> "$GITHUB_STEP_SUMMARY"
