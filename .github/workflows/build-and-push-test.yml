name: Build and Push — Test Wrapper

on:
  # Branch-local harness for validating the real build lane
  # without touching the development branch workflow.
  push:
    branches:
      - ci/build-test/**
      - ci/stage-test/**
      - ci/stage-validation-test/**
    paths:
      - '.github/workflows/build-and-push.yml'
      - '.github/workflows/build-and-push-test.yml'
      - '.github/workflows/deploy-stage.yml'
      - '.github/workflows/deploy-stage-test.yml'
      - '.github/workflows/stage-validation.yml'
      - '.github/workflows/stage-validation-test.yml'
      - '.github/actions/**'
      - 'infra/**'
      - 'Dockerfile'
      - 'package.json'
      - 'package-lock.json'
      - 'apps/**'
      - 'libs/**'
      - 'proto/**'
      - 'nest-cli.json'
      - 'tsconfig.json'
      - 'tsconfig.build.json'
  workflow_dispatch:

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  ECR_REPOSITORY_PREFIX: rd-shop
  NODE_VERSION: '24'

concurrency:
  group: ${{ github.workflow }}-${{ github.sha }}
  cancel-in-progress: false

jobs:
  build-and-push:
    name: Build & Push (${{ matrix.app }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        app: [shop, payments]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ vars.AWS_ROLE_ARN_BUILD }}
          role-session-name: gha-build-test-${{ github.run_id }}

      - name: Verify AWS identity
        run: aws sts get-caller-identity

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_PREFIX }}/${{ matrix.app }}
          tags: |
            type=sha,prefix=sha-,format=long
            type=ref,event=branch

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          target: prod-distroless-${{ matrix.app }}
          build-args: APP=${{ matrix.app }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=docker-${{ matrix.app }}
          cache-to: type=gha,mode=max,scope=docker-${{ matrix.app }}

      - name: Save service metadata
        run: |
          IMAGE_BASE="${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_PREFIX }}/${{ matrix.app }}"
          mkdir -p /tmp/meta
          jq -n \
            --arg image  "${IMAGE_BASE}:sha-${{ github.sha }}" \
            --arg digest "${{ steps.build.outputs.digest }}" \
            '{"image": $image, "digest": $digest}' \
            > /tmp/meta/${{ matrix.app }}.json
          echo "=== ${{ matrix.app }} metadata ==="
          cat /tmp/meta/${{ matrix.app }}.json

      - name: Upload service metadata artifact
        uses: actions/upload-artifact@v7
        with:
          name: image-meta-${{ matrix.app }}
          path: /tmp/meta/${{ matrix.app }}.json
          retention-days: 30

  release-manifest:
    name: Release Manifest
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Download all service metadata
        uses: actions/download-artifact@v8
        with:
          pattern: image-meta-*
          path: /tmp/meta
          merge-multiple: true

      - name: Assemble release-manifest.json
        run: |
          jq -n \
            --arg commit "${{ github.sha }}" \
            --arg ref    "${{ github.ref_name }}" \
            --slurpfile  shop     /tmp/meta/shop.json \
            --slurpfile  payments /tmp/meta/payments.json \
            '{
              commit:   $commit,
              ref:      $ref,
              services: {
                shop:     $shop[0],
                payments: $payments[0]
              }
            }' > release-manifest.json

      - name: Print release manifest
        run: |
          echo "=== release-manifest.json ==="
          cat release-manifest.json

      - name: Upload release manifest
        uses: actions/upload-artifact@v7
        with:
          name: release-manifest-${{ github.sha }}
          path: release-manifest.json
          retention-days: 90

      - name: Write test summary
        if: always()
        run: |
          {
            echo "## Build test wrapper"
            echo ""
            echo "- Branch: ${{ github.ref_name }}"
            echo "- AWS role: ${{ vars.AWS_ROLE_ARN_BUILD }}"
            echo "- Mode: real push + real release manifest"
            echo "- Release manifest: release-manifest-${{ github.sha }}"
          } >> "$GITHUB_STEP_SUMMARY"
