name: Build and Push

on:
  push:
    branches:
      - development

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  ECR_REPOSITORY_PREFIX: rd-shop
  NODE_VERSION: '24'

# Allow one build per commit SHA — different SHAs can run concurrently
# since each produces an independent immutable artifact.
# cancel-in-progress: false ensures every merged commit gets an artifact.
concurrency:
  group: ${{ github.workflow }}-${{ github.sha }}
  cancel-in-progress: false

jobs:
  # ──────────────────────────────────────────────────────────────
  # Build each service image and push to ECR
  # Produces an immutable sha-<commit> tag and a mutable branch tag.
  # ──────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push (${{ matrix.app }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for AWS OIDC federation
    strategy:
      # Keep fail-fast disabled so both services are attempted even if one fails
      fail-fast: false
      matrix:
        app: [shop, payments]
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37 # v6.1.0
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ vars.AWS_ROLE_ARN_BUILD }}
          role-session-name: gha-build-${{ github.run_id }}

      - name: Verify AWS identity
        run: aws sts get-caller-identity

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@19d944daaa35f0fa1d3f7f8af1d3f2e5de25c5b7 # v2.1.4

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_PREFIX }}/${{ matrix.app }}
          tags: |
            # Immutable — primary deployment reference (full SHA)
            type=sha,prefix=sha-,format=long
            # Mutable — convenience reference per branch
            type=ref,event=branch

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build and push image
        id: build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: Dockerfile
          target: prod-distroless-${{ matrix.app }}
          build-args: APP=${{ matrix.app }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Keep default provenance/index behavior for now. If ECR UI noise from
          # tagged image indexes and untagged child artifacts becomes a problem,
          # add `provenance: false` in a later cleanup pass.
          # Layer cache scoped per service
          cache-from: type=gha,scope=docker-${{ matrix.app }}
          cache-to: type=gha,mode=max,scope=docker-${{ matrix.app }}

      - name: Save service metadata
        run: |
          IMAGE_BASE="${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_PREFIX }}/${{ matrix.app }}"
          mkdir -p /tmp/meta
          jq -n \
            --arg image  "${IMAGE_BASE}:sha-${{ github.sha }}" \
            --arg digest "${{ steps.build.outputs.digest }}" \
            '{"image": $image, "digest": $digest}' \
            > /tmp/meta/${{ matrix.app }}.json
          echo "=== ${{ matrix.app }} metadata ==="
          cat /tmp/meta/${{ matrix.app }}.json

      - name: Upload service metadata artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          # Per-service artifact — downloaded and merged in release-manifest job
          name: image-meta-${{ matrix.app }}
          path: /tmp/meta/${{ matrix.app }}.json
          retention-days: 30

  # ──────────────────────────────────────────────────────────────
  # Assemble the release manifest from per-service metadata.
  # This file is the single source of truth for deployments —
  # both stage and production read it to know what to deploy.
  # ──────────────────────────────────────────────────────────────
  release-manifest:
    name: Release Manifest
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Download all service metadata
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: image-meta-*
          path: /tmp/meta
          merge-multiple: true

      - name: Assemble release-manifest.json
        run: |
          jq -n \
            --arg commit "${{ github.sha }}" \
            --arg ref    "${{ github.ref_name }}" \
            --slurpfile  shop     /tmp/meta/shop.json \
            --slurpfile  payments /tmp/meta/payments.json \
            '{
              commit:   $commit,
              ref:      $ref,
              services: {
                shop:     $shop[0],
                payments: $payments[0]
              }
            }' > release-manifest.json

      - name: Print release manifest
        run: |
          echo "=== release-manifest.json ==="
          cat release-manifest.json

      - name: Upload release manifest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          # Keyed by SHA — stage and production deploy jobs download this artifact
          name: release-manifest-${{ github.sha }}
          path: release-manifest.json
          retention-days: 90
