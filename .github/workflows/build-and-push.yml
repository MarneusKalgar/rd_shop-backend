name: Build and Push

on:
  push:
    branches:
      - development
      - main
      - release/*
  # TODO: remove after testing — build-and-push should only run on push (post-merge)
  pull_request:
    branches:
      - development

env:
  REGISTRY: ghcr.io
  NODE_VERSION: '24'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

# Allow one build per commit SHA — different SHAs can run concurrently
# since each produces an independent immutable artifact.
# cancel-in-progress: false ensures every merged commit gets an artifact.
concurrency:
  group: ${{ github.workflow }}-${{ github.sha }}
  cancel-in-progress: false

jobs:
  # ──────────────────────────────────────────────────────────────
  # Build each service image and push to GHCR
  # Produces an immutable sha-<commit> tag and a mutable branch tag.
  # ──────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push (${{ matrix.app }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # required to push to GHCR
    strategy:
      # Keep fail-fast disabled so both services are attempted even if one fails
      fail-fast: false
      matrix:
        app: [shop, payments]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          # metadata-action normalises the image name to lowercase automatically
          images: ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.app }}
          tags: |
            # Immutable — primary deployment reference (full SHA)
            type=sha,prefix=sha-,format=long
            # Mutable — convenience reference per branch
            type=ref,event=branch

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          target: prod-distroless-${{ matrix.app }}
          build-args: APP=${{ matrix.app }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Layer cache scoped per service
          cache-from: type=gha,scope=docker-${{ matrix.app }}
          cache-to: type=gha,mode=max,scope=docker-${{ matrix.app }}

      - name: Save service metadata
        run: |
          # Derive lowercase image base to satisfy Docker tag requirements
          IMAGE_BASE=$(echo "${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.app }}" | tr '[:upper:]' '[:lower:]')
          mkdir -p /tmp/meta
          jq -n \
            --arg image  "${IMAGE_BASE}:sha-${{ github.sha }}" \
            --arg digest "${{ steps.build.outputs.digest }}" \
            '{"image": $image, "digest": $digest}' \
            > /tmp/meta/${{ matrix.app }}.json
          echo "=== ${{ matrix.app }} metadata ==="
          cat /tmp/meta/${{ matrix.app }}.json

      - name: Upload service metadata artifact
        uses: actions/upload-artifact@v7
        with:
          # Per-service artifact — downloaded and merged in release-manifest job
          name: image-meta-${{ matrix.app }}
          path: /tmp/meta/${{ matrix.app }}.json
          retention-days: 30

  # ──────────────────────────────────────────────────────────────
  # Assemble the release manifest from per-service metadata.
  # This file is the single source of truth for deployments —
  # both stage and production read it to know what to deploy.
  # ──────────────────────────────────────────────────────────────
  release-manifest:
    name: Release Manifest
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Download all service metadata
        uses: actions/download-artifact@v8
        with:
          pattern: image-meta-*
          path: /tmp/meta
          merge-multiple: true

      - name: Assemble release-manifest.json
        run: |
          jq -n \
            --arg commit "${{ github.sha }}" \
            --arg ref    "${{ github.ref_name }}" \
            --slurpfile  shop     /tmp/meta/shop.json \
            --slurpfile  payments /tmp/meta/payments.json \
            '{
              commit:   $commit,
              ref:      $ref,
              services: {
                shop:     $shop[0],
                payments: $payments[0]
              }
            }' > release-manifest.json

      - name: Print release manifest
        run: |
          echo "=== release-manifest.json ==="
          cat release-manifest.json

      - name: Upload release manifest
        uses: actions/upload-artifact@v7
        with:
          # Keyed by SHA — stage and production deploy jobs download this artifact
          name: release-manifest-${{ github.sha }}
          path: release-manifest.json
          retention-days: 90
