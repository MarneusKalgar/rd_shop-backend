name: Stage Validation Test Wrapper

on:
  workflow_dispatch:
  workflow_run:
    workflows: ['Deploy — Stage Test Wrapper']
    branches: [ci/stage-validation-test/**]
    types: [completed]

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'eu-central-1' }}
  PAYMENTS_RUNTIME_SECRET_NAME: rd-shop/payments/stage
  PULUMI_STACK: stage
  STAGE_VALIDATION_TASK_MEMORY: '192'
  STAGE_VALIDATION_NAMESPACE: ${{ format('{0}-{1}', vars.STAGE_VALIDATION_NAMESPACE || 'stage-validation', github.run_id) }}
  STAGE_VALIDATION_PRODUCT_ID: ${{ vars.STAGE_VALIDATION_PRODUCT_ID }}
  STAGE_VALIDATION_USER_PASSWORD: ${{ secrets.STAGE_VALIDATION_USER_PASSWORD }}

concurrency:
  group: stage-validation
  cancel-in-progress: false

jobs:
  validate:
    name: Validate Stage Test Wrapper
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment: stage
    permissions:
      actions: read
      contents: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          role-session-name: gha-stage-validation-test-${{ github.run_id }}

      - name: Verify AWS identity
        run: aws sts get-caller-identity

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            infra/package-lock.json

      - name: Install workspace dependencies
        run: npm ci

      - name: Install infra dependencies
        run: npm ci --prefix infra

      - name: Install Pulumi CLI
        uses: pulumi/actions@v6
        with:
          pulumi-version: '^3'

      - name: Capture stage outputs
        id: stack
        working-directory: infra
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
        run: |
          pulumi login
          pulumi stack select "${{ env.PULUMI_STACK }}"

          echo "ecs_cluster_name=$(pulumi stack output ecsClusterName)" >> "$GITHUB_OUTPUT"
          echo "database_backend=$(pulumi stack output databaseBackend)" >> "$GITHUB_OUTPUT"
          echo "database_bootstrap_container_name=$(pulumi stack output databaseBootstrapContainerName 2>/dev/null || true)" >> "$GITHUB_OUTPUT"
          echo "database_bootstrap_instance_id=$(pulumi stack output databaseBootstrapInstanceId 2>/dev/null || true)" >> "$GITHUB_OUTPUT"
          echo "shop_log_group_name=$(pulumi stack output shopLogGroupName)" >> "$GITHUB_OUTPUT"
          echo "shop_task_definition_arn=$(pulumi stack output shopTaskDefinitionArn)" >> "$GITHUB_OUTPUT"

          public_endpoint_url="$(pulumi stack output publicEndpointUrl 2>/dev/null || true)"
          if [[ -z "${public_endpoint_url}" || "${public_endpoint_url}" == "null" ]]; then
            echo "Stage public endpoint URL is not available" >&2
            exit 1
          fi

          echo "public_endpoint_url=${public_endpoint_url}" >> "$GITHUB_OUTPUT"

      - name: Wait for stage PostgreSQL host
        if: ${{ steps.stack.outputs.database_backend == 'ec2-postgres' }}
        env:
          DATABASE_BOOTSTRAP_CONTAINER_NAME: ${{ steps.stack.outputs.database_bootstrap_container_name }}
          DATABASE_BOOTSTRAP_INSTANCE_ID: ${{ steps.stack.outputs.database_bootstrap_instance_id }}
        run: |
          set -euo pipefail

          for attempt in $(seq 1 30); do
            command_id="$(aws ssm send-command \
              --instance-ids "${DATABASE_BOOTSTRAP_INSTANCE_ID}" \
              --document-name 'AWS-RunShellScript' \
              --comment 'Wait for the stage PostgreSQL host to become ready' \
              --parameters "{\"commands\":[\"sudo docker exec ${DATABASE_BOOTSTRAP_CONTAINER_NAME} pg_isready -h 127.0.0.1 -p 5432 -U postgres\"]}" \
              --query 'Command.CommandId' \
              --output text 2>/tmp/stage-db-wait.err || true)"

            if [[ -z "${command_id}" || "${command_id}" == "None" ]]; then
              if grep -Eq 'TargetNotConnected|InvalidInstanceId' /tmp/stage-db-wait.err; then
                echo "Stage PostgreSQL host is not ready for SSM yet (${attempt}/30)"
                sleep 10
                continue
              fi

              cat /tmp/stage-db-wait.err >&2 || true
              exit 1
            fi

            aws ssm wait command-executed \
              --command-id "${command_id}" \
              --instance-id "${DATABASE_BOOTSTRAP_INSTANCE_ID}" || true

            command_status="$(aws ssm get-command-invocation \
              --command-id "${command_id}" \
              --instance-id "${DATABASE_BOOTSTRAP_INSTANCE_ID}" \
              --query 'Status' \
              --output text)"

            if [[ "${command_status}" == "Success" ]]; then
              exit 0
            fi

            echo "Stage PostgreSQL host readiness status: ${command_status} (${attempt}/30)"
            aws ssm get-command-invocation \
              --command-id "${command_id}" \
              --instance-id "${DATABASE_BOOTSTRAP_INSTANCE_ID}" \
              --query '{stdout:StandardOutputContent,stderr:StandardErrorContent}' \
              --output json || true
            sleep 10
          done

          echo "Timed out waiting for the stage PostgreSQL host to become ready" >&2
          exit 1

      - name: Seed stage validation dataset
        id: seed
        env:
          ECS_CLUSTER_NAME: ${{ steps.stack.outputs.ecs_cluster_name }}
          SHOP_LOG_GROUP_NAME: ${{ steps.stack.outputs.shop_log_group_name }}
          SHOP_TASK_DEFINITION_ARN: ${{ steps.stack.outputs.shop_task_definition_arn }}
        run: |
          set -euo pipefail

          run_task() {
            local label="$1"
            local task_definition_arn="$2"
            local container_name="$3"
            local command_json="$4"
            local log_group_name="$5"
            local environment_json="${6:-[]}"

            local overrides
            overrides=$(jq -n \
              --arg name "${container_name}" \
              --argjson command "${command_json}" \
              --argjson environment "${environment_json}" \
              --argjson memory "${STAGE_VALIDATION_TASK_MEMORY}" \
              '{containerOverrides:[{name:$name,command:$command,environment:$environment,memory:$memory}]}')

            local run_task_output
            for attempt in $(seq 1 6); do
              run_task_output=$(aws ecs run-task \
                --cluster "${ECS_CLUSTER_NAME}" \
                --launch-type EC2 \
                --count 1 \
                --task-definition "${task_definition_arn}" \
                --started-by "gha-stage-validation-test-${{ github.run_id }}-${label}" \
                --overrides "${overrides}" \
                --output json)

              if [[ "$(echo "${run_task_output}" | jq '.failures | length')" == "0" ]]; then
                break
              fi

              echo "Failed to start task ${label} (attempt ${attempt}/6)" >&2
              echo "${run_task_output}" | jq . >&2

              if echo "${run_task_output}" | jq -e '.failures | length > 0 and all(.[]; .reason == "AGENT")' >/dev/null; then
                if [[ "${attempt}" != "6" ]]; then
                  echo "ECS agent is not connected yet; retrying in 10s" >&2
                  sleep 10
                  continue
                fi
              fi

              return 1
            done

            if [[ "$(echo "${run_task_output}" | jq '.failures | length')" != "0" ]]; then
              return 1
            fi

            local task_arn
            task_arn=$(echo "${run_task_output}" | jq -r '.tasks[0].taskArn')
            aws ecs wait tasks-stopped --cluster "${ECS_CLUSTER_NAME}" --tasks "${task_arn}"

            local task_id
            task_id="${task_arn##*/}"
            local exit_code
            exit_code=$(aws ecs describe-tasks \
              --cluster "${ECS_CLUSTER_NAME}" \
              --tasks "${task_arn}" \
              --query "tasks[0].containers[?name=='${container_name}'].exitCode | [0]" \
              --output text)

            if [[ -z "${exit_code}" || "${exit_code}" != "0" ]]; then
              echo "Task ${label} failed with exit code ${exit_code}" >&2

              local log_stream_name
              log_stream_name=$(aws logs describe-log-streams \
                --log-group-name "${log_group_name}" \
                --log-stream-name-prefix "${container_name}/${container_name}/" \
                --output json | jq -r --arg task_id "${task_id}" \
                '.logStreams[]? | select(.logStreamName | contains($task_id)) | .logStreamName' | head -n 1)

              if [[ -n "${log_stream_name}" ]]; then
                echo "CloudWatch logs (${log_group_name} / ${log_stream_name}):"
                aws logs get-log-events \
                  --log-group-name "${log_group_name}" \
                  --log-stream-name "${log_stream_name}" \
                  --limit 200 \
                  --output json | jq -r '.events[]?.message'
              fi

              return 1
            fi
          }

          environment_json=$(jq -nc \
            --arg namespace "${STAGE_VALIDATION_NAMESPACE}" \
            --arg product_id "${STAGE_VALIDATION_PRODUCT_ID}" \
            --arg user_password "${STAGE_VALIDATION_USER_PASSWORD}" \
            '[
              {"name":"STAGE_VALIDATION_NAMESPACE","value":$namespace},
              {"name":"STAGE_VALIDATION_PRODUCT_ID","value":$product_id},
              {"name":"STAGE_VALIDATION_USER_PASSWORD","value":$user_password}
            ]')

          run_task \
            stage-validation-seed \
            "${SHOP_TASK_DEFINITION_ARN}" \
            shop \
            '["dist/apps/shop/db/stage-validation/seed.js"]' \
            "${SHOP_LOG_GROUP_NAME}" \
            "${environment_json}"

      - name: Run stage e2e suite
        if: ${{ steps.seed.outcome == 'success' }}
        env:
          STAGE_VALIDATION_BASE_URL: ${{ steps.stack.outputs.public_endpoint_url }}
          STAGE_VALIDATION_NAMESPACE: ${{ env.STAGE_VALIDATION_NAMESPACE }}
          STAGE_VALIDATION_PRODUCT_ID: ${{ env.STAGE_VALIDATION_PRODUCT_ID }}
          STAGE_VALIDATION_USER_PASSWORD: ${{ env.STAGE_VALIDATION_USER_PASSWORD }}
        run: npm run test:e2e:shop:stage

      - name: Cleanup stage validation dataset
        if: ${{ always() && steps.stack.outcome == 'success' }}
        env:
          ECS_CLUSTER_NAME: ${{ steps.stack.outputs.ecs_cluster_name }}
          SHOP_LOG_GROUP_NAME: ${{ steps.stack.outputs.shop_log_group_name }}
          SHOP_TASK_DEFINITION_ARN: ${{ steps.stack.outputs.shop_task_definition_arn }}
        run: |
          set -euo pipefail

          run_task() {
            local label="$1"
            local task_definition_arn="$2"
            local container_name="$3"
            local command_json="$4"
            local log_group_name="$5"
            local environment_json="${6:-[]}"

            local overrides
            overrides=$(jq -n \
              --arg name "${container_name}" \
              --argjson command "${command_json}" \
              --argjson environment "${environment_json}" \
              --argjson memory "${STAGE_VALIDATION_TASK_MEMORY}" \
              '{containerOverrides:[{name:$name,command:$command,environment:$environment,memory:$memory}]}')

            local run_task_output
            for attempt in $(seq 1 6); do
              run_task_output=$(aws ecs run-task \
                --cluster "${ECS_CLUSTER_NAME}" \
                --launch-type EC2 \
                --count 1 \
                --task-definition "${task_definition_arn}" \
                --started-by "gha-stage-validation-test-${{ github.run_id }}-${label}" \
                --overrides "${overrides}" \
                --output json)

              if [[ "$(echo "${run_task_output}" | jq '.failures | length')" == "0" ]]; then
                break
              fi

              echo "Failed to start task ${label} (attempt ${attempt}/6)" >&2
              echo "${run_task_output}" | jq . >&2

              if echo "${run_task_output}" | jq -e '.failures | length > 0 and all(.[]; .reason == "AGENT")' >/dev/null; then
                if [[ "${attempt}" != "6" ]]; then
                  echo "ECS agent is not connected yet; retrying in 10s" >&2
                  sleep 10
                  continue
                fi
              fi

              return 1
            done

            if [[ "$(echo "${run_task_output}" | jq '.failures | length')" != "0" ]]; then
              return 1
            fi

            local task_arn
            task_arn=$(echo "${run_task_output}" | jq -r '.tasks[0].taskArn')
            aws ecs wait tasks-stopped --cluster "${ECS_CLUSTER_NAME}" --tasks "${task_arn}"

            local task_id
            task_id="${task_arn##*/}"
            local exit_code
            exit_code=$(aws ecs describe-tasks \
              --cluster "${ECS_CLUSTER_NAME}" \
              --tasks "${task_arn}" \
              --query "tasks[0].containers[?name=='${container_name}'].exitCode | [0]" \
              --output text)

            if [[ -z "${exit_code}" || "${exit_code}" != "0" ]]; then
              echo "Task ${label} failed with exit code ${exit_code}" >&2

              local log_stream_name
              log_stream_name=$(aws logs describe-log-streams \
                --log-group-name "${log_group_name}" \
                --log-stream-name-prefix "${container_name}/${container_name}/" \
                --output json | jq -r --arg task_id "${task_id}" \
                '.logStreams[]? | select(.logStreamName | contains($task_id)) | .logStreamName' | head -n 1)

              if [[ -n "${log_stream_name}" ]]; then
                echo "CloudWatch logs (${log_group_name} / ${log_stream_name}):"
                aws logs get-log-events \
                  --log-group-name "${log_group_name}" \
                  --log-stream-name "${log_stream_name}" \
                  --limit 200 \
                  --output json | jq -r '.events[]?.message'
              fi

              return 1
            fi
          }

          payments_database_url="$(aws secretsmanager get-secret-value \
            --secret-id "${PAYMENTS_RUNTIME_SECRET_NAME}" \
            --query SecretString \
            --output text | jq -r '.DATABASE_URL')"

          environment_json=$(jq -nc \
            --arg namespace "${STAGE_VALIDATION_NAMESPACE}" \
            --arg payments_database_url "${payments_database_url}" \
            --arg product_id "${STAGE_VALIDATION_PRODUCT_ID}" \
            '[
              {"name":"STAGE_VALIDATION_NAMESPACE","value":$namespace},
              {"name":"STAGE_VALIDATION_PRODUCT_ID","value":$product_id},
              {"name":"VALIDATION_PAYMENTS_DATABASE_URL","value":$payments_database_url}
            ]')

          run_task \
            stage-validation-cleanup \
            "${SHOP_TASK_DEFINITION_ARN}" \
            shop \
            '["dist/apps/shop/db/stage-validation/cleanup.js"]' \
            "${SHOP_LOG_GROUP_NAME}" \
            "${environment_json}"
