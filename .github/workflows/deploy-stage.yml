name: Deploy — Stage

on:
  # Automatically triggered when build-and-push completes on the development branch.
  # Production deploys the same artifact manually via deploy-production.yml (workflow_dispatch).
  workflow_run:
    workflows: ['Build and Push']
    branches: [development]
    types: [completed]

# Never cancel an in-progress deploy — always let it finish
concurrency:
  group: deploy-stage
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Stage
    runs-on: ubuntu-latest
    environment: stage # Separate env variables / secrets scoped to stage
    env:
      PULUMI_STACK: stage

    permissions:
      actions: read # Required to download artifacts from workflow_run
      contents: read # Standard read access
      id-token: write # required for AWS OIDC federation

    # Only proceed if the upstream build actually succeeded
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      # ── 1. Checkout the commit that triggered this workflow ──────────────────
      # Must come first: checkout wipes the workspace, so the artifact download
      # must happen after it. Also required to resolve local actions under .github/actions/
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: ${{ vars.AWS_REGION || 'eu-central-1' }}
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          role-session-name: gha-stage-${{ github.run_id }}

      - name: Verify AWS identity
        run: aws sts get-caller-identity

      # ── 2. Download the release manifest produced by build-and-push ──────────
      - name: Download release manifest
        uses: actions/download-artifact@v8
        with:
          name: release-manifest-${{ github.event.workflow_run.head_sha }}
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # ── 3. Extract image references and commit info ───────────────────────────
      - name: Parse release manifest
        id: manifest
        uses: ./.github/actions/parse-release-manifest

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: infra/package-lock.json

      - name: Install infra dependencies
        run: npm ci --prefix infra

      - name: Install Pulumi CLI
        uses: pulumi/actions@v6
        with:
          pulumi-version: '^3'

      - name: Configure stage stack image inputs
        working-directory: infra
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
        run: |
          pulumi login
          pulumi stack select "${{ env.PULUMI_STACK }}"
          pulumi config set --stack "${{ env.PULUMI_STACK }}" rd-shop-infra:shopImageUri "${{ steps.manifest.outputs.shop-image }}"
          pulumi config set --stack "${{ env.PULUMI_STACK }}" rd-shop-infra:paymentsImageUri "${{ steps.manifest.outputs.payments-image }}"

      - name: Apply stage stack
        working-directory: infra
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
        run: |
          pulumi stack select "${{ env.PULUMI_STACK }}"
          pulumi up --stack "${{ env.PULUMI_STACK }}" --yes --non-interactive

      - name: Capture stage outputs
        id: stack
        working-directory: infra
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
        run: |
          pulumi stack select "${{ env.PULUMI_STACK }}"

          echo "ecs_cluster_name=$(pulumi stack output ecsClusterName)" >> "$GITHUB_OUTPUT"
          echo "payments_log_group_name=$(pulumi stack output paymentsLogGroupName)" >> "$GITHUB_OUTPUT"
          echo "payments_service_name=$(pulumi stack output paymentsServiceName)" >> "$GITHUB_OUTPUT"
          echo "payments_task_definition_arn=$(pulumi stack output paymentsTaskDefinitionArn)" >> "$GITHUB_OUTPUT"
          echo "shop_log_group_name=$(pulumi stack output shopLogGroupName)" >> "$GITHUB_OUTPUT"
          echo "shop_service_name=$(pulumi stack output shopServiceName)" >> "$GITHUB_OUTPUT"
          echo "shop_target_group_arn=$(pulumi stack output shopTargetGroupArn)" >> "$GITHUB_OUTPUT"
          echo "shop_task_definition_arn=$(pulumi stack output shopTaskDefinitionArn)" >> "$GITHUB_OUTPUT"

          public_endpoint_url="$(pulumi stack output publicEndpointUrl 2>/dev/null || true)"
          if [[ -z "${public_endpoint_url}" || "${public_endpoint_url}" == "null" ]]; then
            echo "Stage public endpoint URL is not available" >&2
            exit 1
          fi
          echo "public_endpoint_url=${public_endpoint_url}" >> "$GITHUB_OUTPUT"

      - name: Quiesce ECS services before DB init
        id: quiesce_services
        env:
          ECS_CLUSTER_NAME: ${{ steps.stack.outputs.ecs_cluster_name }}
          PAYMENTS_SERVICE_NAME: ${{ steps.stack.outputs.payments_service_name }}
          SHOP_SERVICE_NAME: ${{ steps.stack.outputs.shop_service_name }}
        run: |
          set -euo pipefail

          payments_desired_count=$(aws ecs describe-services \
            --cluster "${ECS_CLUSTER_NAME}" \
            --services "${PAYMENTS_SERVICE_NAME}" \
            --query 'services[0].desiredCount' \
            --output text)
          shop_desired_count=$(aws ecs describe-services \
            --cluster "${ECS_CLUSTER_NAME}" \
            --services "${SHOP_SERVICE_NAME}" \
            --query 'services[0].desiredCount' \
            --output text)

          echo "PAYMENTS_DESIRED_COUNT=${payments_desired_count}" >> "$GITHUB_ENV"
          echo "SHOP_DESIRED_COUNT=${shop_desired_count}" >> "$GITHUB_ENV"

          aws ecs update-service \
            --cluster "${ECS_CLUSTER_NAME}" \
            --service "${PAYMENTS_SERVICE_NAME}" \
            --desired-count 0 >/dev/null
          aws ecs update-service \
            --cluster "${ECS_CLUSTER_NAME}" \
            --service "${SHOP_SERVICE_NAME}" \
            --desired-count 0 >/dev/null

          aws ecs wait services-stable \
            --cluster "${ECS_CLUSTER_NAME}" \
            --services "${PAYMENTS_SERVICE_NAME}"
          aws ecs wait services-stable \
            --cluster "${ECS_CLUSTER_NAME}" \
            --services "${SHOP_SERVICE_NAME}"

      - name: Run stage database init tasks
        id: db_init
        env:
          ECS_CLUSTER_NAME: ${{ steps.stack.outputs.ecs_cluster_name }}
          PAYMENTS_LOG_GROUP_NAME: ${{ steps.stack.outputs.payments_log_group_name }}
          PAYMENTS_TASK_DEFINITION_ARN: ${{ steps.stack.outputs.payments_task_definition_arn }}
          SHOP_LOG_GROUP_NAME: ${{ steps.stack.outputs.shop_log_group_name }}
          SHOP_TASK_DEFINITION_ARN: ${{ steps.stack.outputs.shop_task_definition_arn }}
        run: |
          set -euo pipefail

          run_task() {
            local label="$1"
            local task_definition_arn="$2"
            local container_name="$3"
            local command_json="$4"
            local log_group_name="$5"
            local environment_json="${6:-[]}"

            local overrides
            overrides=$(jq -n \
              --arg name "${container_name}" \
              --argjson command "${command_json}" \
              --argjson environment "${environment_json}" \
              '{containerOverrides:[{name:$name,command:$command,environment:$environment}]}')

            local run_task_output
            run_task_output=$(aws ecs run-task \
              --cluster "${ECS_CLUSTER_NAME}" \
              --launch-type EC2 \
              --count 1 \
              --task-definition "${task_definition_arn}" \
              --started-by "gha-stage-${{ github.run_id }}-${label}" \
              --overrides "${overrides}" \
              --output json)

            if [[ "$(echo "${run_task_output}" | jq '.failures | length')" != "0" ]]; then
              echo "Failed to start task ${label}"
              echo "${run_task_output}" | jq .
              return 1
            fi

            local task_arn
            task_arn=$(echo "${run_task_output}" | jq -r '.tasks[0].taskArn')

            aws ecs wait tasks-stopped --cluster "${ECS_CLUSTER_NAME}" --tasks "${task_arn}"

            local task_description
            task_description=$(aws ecs describe-tasks \
              --cluster "${ECS_CLUSTER_NAME}" \
              --tasks "${task_arn}" \
              --output json)

            local task_stopped_reason
            task_stopped_reason=$(echo "${task_description}" | jq -r '.tasks[0].stoppedReason // ""')

            local exit_code
            exit_code=$(echo "${task_description}" | jq -r \
              --arg container_name "${container_name}" \
              '.tasks[0].containers[] | select(.name == $container_name) | .exitCode // ""')

            local container_reason
            container_reason=$(echo "${task_description}" | jq -r \
              --arg container_name "${container_name}" \
              '.tasks[0].containers[] | select(.name == $container_name) | .reason // ""')

            if [[ -z "${exit_code}" || "${exit_code}" != "0" ]]; then
              echo "Task ${label} failed"
              if [[ -n "${task_stopped_reason}" ]]; then
                echo "Stopped reason: ${task_stopped_reason}"
              fi
              if [[ -n "${container_reason}" ]]; then
                echo "Container reason: ${container_reason}"
              fi

              local task_id
              task_id="${task_arn##*/}"

              local log_stream_name
              log_stream_name=$(aws logs describe-log-streams \
                --log-group-name "${log_group_name}" \
                --log-stream-name-prefix "${container_name}/${container_name}/" \
                --output json | jq -r --arg task_id "${task_id}" \
                '.logStreams[]? | select(.logStreamName | contains($task_id)) | .logStreamName' | head -n 1)

              if [[ -n "${log_stream_name}" ]]; then
                echo "CloudWatch logs (${log_group_name} / ${log_stream_name}):"
                aws logs get-log-events \
                  --log-group-name "${log_group_name}" \
                  --log-stream-name "${log_stream_name}" \
                  --limit 100 \
                  --output json | jq -r '.events[]?.message'
              else
                echo "CloudWatch log stream not found for task ${task_id} in ${log_group_name}"
              fi

              echo "${task_description}" | jq .
              return 1
            fi

            return 0
          }

          task_failures=()

          if ! run_task \
            payments-migrate \
            "${PAYMENTS_TASK_DEFINITION_ARN}" \
            payments \
            '["node_modules/typeorm/cli.js","migration:run","-d","dist/apps/payments/data-source.js"]' \
            "${PAYMENTS_LOG_GROUP_NAME}"; then
            task_failures+=("payments-migrate")
          fi

          shop_migrate_succeeded=false
          if run_task \
            shop-migrate \
            "${SHOP_TASK_DEFINITION_ARN}" \
            shop \
            '["node_modules/typeorm/cli.js","migration:run","-d","dist/apps/shop/data-source.js"]' \
            "${SHOP_LOG_GROUP_NAME}"; then
            shop_migrate_succeeded=true
          else
            task_failures+=("shop-migrate")
          fi

          if [[ "${shop_migrate_succeeded}" == "true" ]]; then
            if ! run_task \
              shop-seed \
              "${SHOP_TASK_DEFINITION_ARN}" \
              shop \
              '["dist/apps/shop/db/seed/index.js"]' \
              "${SHOP_LOG_GROUP_NAME}" \
              '[{"name":"ALLOW_SEED_IN_PRODUCTION","value":"true"}]'; then
              task_failures+=("shop-seed")
            fi
          else
            echo "Skipping shop-seed because shop-migrate failed"
          fi

          if (( ${#task_failures[@]} > 0 )); then
            echo "DB init failures: ${task_failures[*]}"
            exit 1
          fi

      - name: Restore ECS services and trigger rollout
        if: ${{ always() && steps.quiesce_services.outcome == 'success' }}
        env:
          ECS_CLUSTER_NAME: ${{ steps.stack.outputs.ecs_cluster_name }}
          PAYMENTS_SERVICE_NAME: ${{ steps.stack.outputs.payments_service_name }}
          SHOP_SERVICE_NAME: ${{ steps.stack.outputs.shop_service_name }}
        run: |
          set -euo pipefail

          aws ecs update-service \
            --cluster "${ECS_CLUSTER_NAME}" \
            --service "${PAYMENTS_SERVICE_NAME}" \
            --desired-count "${PAYMENTS_DESIRED_COUNT}" \
            --force-new-deployment >/dev/null
          aws ecs update-service \
            --cluster "${ECS_CLUSTER_NAME}" \
            --service "${SHOP_SERVICE_NAME}" \
            --desired-count "${SHOP_DESIRED_COUNT}" \
            --force-new-deployment >/dev/null

      - name: Wait for ECS services to stabilize
        if: ${{ always() && steps.quiesce_services.outcome == 'success' }}
        env:
          ECS_CLUSTER_NAME: ${{ steps.stack.outputs.ecs_cluster_name }}
          PAYMENTS_SERVICE_NAME: ${{ steps.stack.outputs.payments_service_name }}
          SHOP_SERVICE_NAME: ${{ steps.stack.outputs.shop_service_name }}
        run: |
          aws ecs wait services-stable \
            --cluster "${ECS_CLUSTER_NAME}" \
            --services "${PAYMENTS_SERVICE_NAME}"
          aws ecs wait services-stable \
            --cluster "${ECS_CLUSTER_NAME}" \
            --services "${SHOP_SERVICE_NAME}"

      - name: Dump ECS stabilization diagnostics
        if: ${{ failure() && steps.quiesce_services.outcome == 'success' }}
        env:
          ECS_CLUSTER_NAME: ${{ steps.stack.outputs.ecs_cluster_name }}
          PAYMENTS_SERVICE_NAME: ${{ steps.stack.outputs.payments_service_name }}
          SHOP_SERVICE_NAME: ${{ steps.stack.outputs.shop_service_name }}
          SHOP_TARGET_GROUP_ARN: ${{ steps.stack.outputs.shop_target_group_arn }}
        run: |
          set -euo pipefail

          echo "=== ECS service state ==="
          aws ecs describe-services \
            --cluster "${ECS_CLUSTER_NAME}" \
            --services "${PAYMENTS_SERVICE_NAME}" "${SHOP_SERVICE_NAME}" \
            --output json | jq '.services[] | {
              serviceName,
              status,
              desiredCount,
              runningCount,
              pendingCount,
              deployments: [.deployments[] | {
                status,
                rolloutState,
                desiredCount,
                runningCount,
                pendingCount,
                taskDefinition
              }],
              events: [.events[:10][] | {createdAt, message}]
            }'

          dump_tasks() {
            local service_name="$1"
            local task_arns

            task_arns=$(aws ecs list-tasks \
              --cluster "${ECS_CLUSTER_NAME}" \
              --service-name "${service_name}" \
              --desired-status RUNNING \
              --query 'taskArns' \
              --output text)

            if [[ -z "${task_arns}" || "${task_arns}" == "None" ]]; then
              task_arns=$(aws ecs list-tasks \
                --cluster "${ECS_CLUSTER_NAME}" \
                --service-name "${service_name}" \
                --desired-status STOPPED \
                --query 'taskArns[:5]' \
                --output text)
            fi

            if [[ -z "${task_arns}" || "${task_arns}" == "None" ]]; then
              echo "No tasks found for ${service_name}"
              return
            fi

            echo "=== Tasks for ${service_name} ==="
            aws ecs describe-tasks \
              --cluster "${ECS_CLUSTER_NAME}" \
              --tasks ${task_arns} \
              --output json | jq '.tasks[] | {
                taskArn,
                lastStatus,
                desiredStatus,
                healthStatus,
                stoppedReason,
                containers: [.containers[] | {
                  name,
                  lastStatus,
                  healthStatus,
                  exitCode,
                  reason
                }]
              }'
          }

          dump_tasks "${PAYMENTS_SERVICE_NAME}"
          dump_tasks "${SHOP_SERVICE_NAME}"

          if [[ -n "${SHOP_TARGET_GROUP_ARN}" && "${SHOP_TARGET_GROUP_ARN}" != "null" ]]; then
            echo "=== Shop target group health ==="
            aws elbv2 describe-target-health \
              --target-group-arn "${SHOP_TARGET_GROUP_ARN}" \
              --output json | jq '.TargetHealthDescriptions[] | {
                target: .Target,
                health: .TargetHealth
              }'
          fi

      - name: Smoke test — shop health check
        uses: ./.github/actions/smoke-test-shop-http
        with:
          base-url: ${{ steps.stack.outputs.public_endpoint_url }}

      # ── 6. Write step summary ─────────────────────────────────────────────────
      - name: Write deploy summary
        if: always()
        uses: ./.github/actions/write-deploy-summary
        with:
          environment: stage
          commit: ${{ steps.manifest.outputs.commit }}
          ref: ${{ steps.manifest.outputs.ref }}
          shop-image: ${{ steps.manifest.outputs.shop-image }}
          shop-digest: ${{ steps.manifest.outputs.shop-digest }}
          payments-image: ${{ steps.manifest.outputs.payments-image }}
          payments-digest: ${{ steps.manifest.outputs.payments-digest }}
