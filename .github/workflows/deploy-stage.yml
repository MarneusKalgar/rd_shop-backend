name: Deploy — Stage

on:
  # Automatically triggered when build-and-push completes on the development branch.
  # Production deploys the same artifact manually via deploy-production.yml (workflow_dispatch).
  workflow_run:
    workflows: ['Build and Push']
    branches: [development]
    types: [completed]

# Never cancel an in-progress deploy — always let it finish
concurrency:
  group: deploy-stage
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Stage
    runs-on: ubuntu-latest
    environment: stage # Separate env variables / secrets scoped to stage

    permissions:
      actions: read # Required to download artifacts from workflow_run
      contents: read # Standard read access
      id-token: write # required for AWS OIDC federation

    # Only proceed if the upstream build actually succeeded
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      # ── 1. Checkout the commit that triggered this workflow ──────────────────
      # Must come first: checkout wipes the workspace, so the artifact download
      # must happen after it. Also required to resolve local actions under .github/actions/
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-region: ${{ vars.AWS_REGION || 'eu-central-1' }}
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          role-session-name: gha-stage-${{ github.run_id }}

      - name: Verify AWS identity
        run: aws sts get-caller-identity

      # ── 2. Download the release manifest produced by build-and-push ──────────
      - name: Download release manifest
        uses: actions/download-artifact@v8
        with:
          name: release-manifest-${{ github.event.workflow_run.head_sha }}
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # ── 3. Extract image references and commit info ───────────────────────────
      - name: Parse release manifest
        id: manifest
        uses: ./.github/actions/parse-release-manifest

      # ── 4. SSH into stage VM and deploy ──────────────────────────────────────
      #
      # Secrets required (scoped to the `stage` GitHub Environment):
      #   SSH_PRIVATE_KEY     — private key for the deploy user
      #   ENV_FILE_SHOP       — base64-encoded .env file for shop app
      #   ENV_FILE_PAYMENTS   — base64-encoded .env file for payments app
      #   GHCR_TOKEN          — GitHub PAT with read:packages scope (for docker login on VM)
      #
      # Variables required (scoped to the `stage` GitHub Environment):
      #   SSH_HOST         — hostname / IP of the stage VM
      #   SSH_USER         — SSH username on the VM
      #   DEPLOY_DIR       — absolute path where the repo is checked out on the VM
      #
      - name: Deploy to stage
        uses: ./.github/actions/deploy-to-stage
        with:
          ssh-host: ${{ vars.SSH_HOST }}
          ssh-user: ${{ vars.SSH_USER }}
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
          deploy-dir: ${{ vars.DEPLOY_DIR }}
          shop-image: ${{ steps.manifest.outputs.shop-image }}
          payments-image: ${{ steps.manifest.outputs.payments-image }}
          commit-sha: ${{ steps.manifest.outputs.commit }}
          ghcr-token: ${{ secrets.GHCR_TOKEN }}
          ghcr-user: ${{ github.repository_owner }}
          env-file-shop: ${{ secrets.ENV_FILE_SHOP }}
          env-file-payments: ${{ secrets.ENV_FILE_PAYMENTS }}

      # ── 5. Post-deploy smoke test ─────────────────────────────────────────────
      #
      # Variable required (scoped to the `stage` GitHub Environment):
      #   BASE_URL — local URL on the VM, e.g.: http://localhost:8080
      #
      - name: Smoke test — shop health check
        uses: ./.github/actions/smoke-test-shop
        with:
          ssh-host: ${{ vars.SSH_HOST }}
          ssh-user: ${{ vars.SSH_USER }}
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
          base-url: ${{ vars.BASE_URL }}

      # ── 6. Write step summary ─────────────────────────────────────────────────
      - name: Write deploy summary
        if: always()
        uses: ./.github/actions/write-deploy-summary
        with:
          commit: ${{ steps.manifest.outputs.commit }}
          ref: ${{ steps.manifest.outputs.ref }}
          shop-image: ${{ steps.manifest.outputs.shop-image }}
          shop-digest: ${{ steps.manifest.outputs.shop-digest }}
          payments-image: ${{ steps.manifest.outputs.payments-image }}
          payments-digest: ${{ steps.manifest.outputs.payments-digest }}
