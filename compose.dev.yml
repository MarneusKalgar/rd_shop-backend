# Development overrides
# Usage: docker compose -f compose-new.yml -f compose-new.dev.yml up
services:
  app:
    container_name: ${COMPOSE_PROJECT_NAME:-rd_shop_dev}-app
    build:
      context: .
      dockerfile: Dockerfile.dev
      target: ''
    init: false
    user: '1001:1001'
    environment:
      PORT: ${PORT:-8080}
    ports:
      - '${PORT:-8080}:${PORT:-8080}'
    volumes:
      - ./src:/app/src
      - /app/node_modules
    env_file:
      - .env.development
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - rd_shop_dev-network
      - rd_shop_dev-network-internal

  postgres:
    container_name: ${COMPOSE_PROJECT_NAME:-rd_shop_dev}-postgres
    env_file:
      - .env.development
    networks:
      rd_shop_dev-network-internal:
        aliases:
          - postgres

  minio:
    container_name: ${COMPOSE_PROJECT_NAME:-rd_shop_dev}-minio
    env_file:
      - .env.development
    ports:
      - '${MINIO_PORT:-9000}:9000'
      - '${MINIO_CONSOLE_PORT:-9001}:9001'
    networks:
      - rd_shop_dev-network

  minio-init:
    container_name: ${COMPOSE_PROJECT_NAME:-rd_shop_dev}-minio-init
    networks:
      - rd_shop_dev-network

  rabbitmq:
    container_name: ${COMPOSE_PROJECT_NAME:-rd_shop_dev}-rabbitmq
    ports:
      - '${RABBITMQ_PORT:-5672}:5672'
      - '${RABBITMQ_MANAGEMENT_PORT:-15672}:15672'
    env_file:
      - .env.development
    networks:
      - rd_shop_dev-network
      - rd_shop_dev-network-internal

  migrate:
    container_name: ${COMPOSE_PROJECT_NAME:-rd_shop_dev}-migrate
    build:
      context: .
      dockerfile: Dockerfile.dev
      target: ''
    volumes:
      - ./src:/app/src
      - /app/node_modules
    env_file:
      - .env.development
    command: npm run db:migrate:dev
    networks:
      - rd_shop_dev-network-internal

  seed:
    container_name: ${COMPOSE_PROJECT_NAME:-rd_shop_dev}-seed
    build:
      context: .
      dockerfile: Dockerfile.dev
      target: ''
    volumes:
      - ./src:/app/src
      - /app/node_modules
    env_file:
      - .env.development
    command: npm run db:seed:dev
    networks:
      - rd_shop_dev-network-internal

networks:
  rd_shop_dev-network:
    driver: bridge

  rd_shop_dev-network-internal:
    driver: bridge
    internal: true
