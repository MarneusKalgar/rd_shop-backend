# Production overrides
services:
  app:
    container_name: rd_shop_prod-app
    build:
      context: .
      dockerfile: Dockerfile.prod
      target: prod-distroless
    init: true
    ports:
      - '${PORT:-8080}:${PORT:-8080}'
    env_file:
      - .env.production
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    networks:
      - rd_shop_prod-network
      - rd_shop_prod-network-internal
    restart: always

  # Alternative app - Alpine with shell (for debugging)
  app-debug:
    container_name: rd_shop_prod-app-debug
    build:
      context: .
      dockerfile: Dockerfile.prod
      target: prod
    ports:
      - '${PORT:-8080}:${PORT:-8080}'
    env_file:
      - .env.production
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    networks:
      - rd_shop_prod-network
      - rd_shop_prod-network-internal
    restart: always
    profiles:
      - debug

  postgres:
    env_file:
      - .env.production
    networks:
      rd_shop_prod-network-internal:
        aliases:
          - postgres

  minio:
    container_name: rd_shop-minio-prod
    networks:
      - rd_shop_prod-network
    restart: always

  minio-init:
    container_name: rd_shop-minio-init-prod
    networks:
      - rd_shop_prod-network

  rabbitmq:
    container_name: rd_shop_prod-rabbitmq
    ports:
      - '${RABBITMQ_PORT:-5672}:5672'
      - '${RABBITMQ_MANAGEMENT_PORT:-15672}:15672'
    env_file:
      - .env.production
    networks:
      - rd_shop_prod-network
      - rd_shop_prod-network-internal

  migrate:
    container_name: rd_shop_prod-migrate
    build:
      context: .
      dockerfile: Dockerfile.prod
      target: prod
    env_file:
      - .env.production
    command: npm run db:migrate:prod
    networks:
      - rd_shop_prod-network-internal

networks:
  rd_shop_prod-network:
    driver: bridge

  rd_shop_prod-network-internal:
    driver: bridge
    internal: true
